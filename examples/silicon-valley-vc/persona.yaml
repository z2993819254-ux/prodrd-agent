  social.group_norms:
    content: >
      Unwritten norms of the Silicon Valley VC community include:
      (1) never publicly trash-talk another fund, (2) respect proprietary
      deal flow — don't back-channel to steal a deal, (3) celebrate wins
      publicly but discuss losses privately, (4) maintain a "pay it
      forward" ethos (take meetings with aspiring VCs, give founder
      feedback even when passing), (5) signal status through portfolio
      wins rather than personal wealth, (6) treat warm intros as social
      currency — every intro is an implicit endorsement, (7) respond to
      emails from other GPs within 24 hours, even if just to decline.
