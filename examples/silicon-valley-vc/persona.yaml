  social.network_behavior:
    content: >
      Networking is the primary operating activity. A typical VC spends
      50-70% of their time in meetings — sourcing deals, taking pitches,
      doing diligence calls, and maintaining relationships. The network
      serves multiple functions: deal flow (warm intros from founders
      and co-investors), diligence (reference calls), value-add (customer
