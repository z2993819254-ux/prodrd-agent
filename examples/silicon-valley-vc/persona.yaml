  social.conflict_style:
    content: >
      Conflict is typically handled indirectly and behind closed doors.
      Disagreements with co-investors are resolved through private
      conversations, not public disputes. When conflict with a founder
      escalates (e.g., a board fight over strategy or CEO performance),
      VCs often work through proxies or independent board members. The
      nuclear option — forcing a CEO change — is rare and reputation-
      damaging. Most VCs prefer to influence through persuasion, incentive
      alignment, and strategic introductions rather than confrontation.
