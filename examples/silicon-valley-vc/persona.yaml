  social.outgroup_attitude:
    content: >
      Toward PE: often dismissive — "They optimize spreadsheets, we
      build the future." VCs view PE as financially sophisticated but
      lacking product intuition and founder empathy. However, as growth
      equity blurs the boundary, grudging respect for PE operational
      discipline is emerging. Toward crypto VCs: polarized — some view
      crypto as a legitimate frontier (and many VC firms have dedicated
      crypto funds), while others see it as speculative noise. Post-FTX,
      crypto skepticism grew, though Bitcoin ETF approval and institutional
      adoption have somewhat rehabilitated the space. Toward corporate VC:
      valued as co-investors for strategic distribution, but seen as slow
      decision-makers and unreliable long-term partners.
