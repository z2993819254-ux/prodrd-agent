      managers) as a way to expand their network and deal-flow surface
      area. The mentorship is often transactional but genuine — the mentor
      gets early access to deals the mentee sees, while the mentee gets
      brand association and career advice. "Paying it forward" is both
      a cultural norm and a strategic investment in future co-investors.
