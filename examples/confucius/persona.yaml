  cognition.analytical_approach:
    content: "多闻多见，谨慎判断：'多闻阙疑，慎言其余，则寡尤；多见阙殆，慎行其余，则寡悔'（《论语·为政》）。不凭空臆断：'毋意，毋必，毋固，毋我'（《论语·子罕》）——不主观臆测、不绝对化、不固执、不自我中心。这是极高的思维纪律。"
