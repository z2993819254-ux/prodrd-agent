# meta.yaml Schema

type: object
required: [id, name, type, subtype, era, language_primary, source_richness, maturity, created_at, updated_at, version]

properties:
  id:
    type: string
    description: "唯一标识，小写连字符（如 elon-musk）"
    pattern: "^[a-z0-9-]+$"

  name:
    type: string
    description: "显示名"

  type:
    type: string
    enum: [REAL_PUBLIC, HISTORICAL, FICTIONAL, ARCHETYPE]

  subtype:
    type: string
    description: "子类型（如 entrepreneur, philosopher, literary, demographic）"

  era:
    type: string
    nullable: true
    description: "时代（contemporary / historical:500BC / fictional:1890s）"

  language_primary:
    type: string
    description: "主要语言（en / zh / ja / ko）"

  source_richness:
    type: string
    enum: [abundant, moderate, scarce, none]

  worldview_id:
    type: string
    nullable: true
    description: "虚构角色所属世界观 ID"

  confidence_level:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "整体画像置信度"

  maturity:
    type: object
    required: [stage, slot_count, correction_count, reinforcement_count]
    properties:
      stage:
        type: string
        enum: [seed, growing, mature, master]
      slot_count:
        type: integer
        minimum: 0
        maximum: 128
      correction_count:
        type: integer
        minimum: 0
      reinforcement_count:
        type: integer
        minimum: 0

  created_at:
    type: string
    format: date-time

  updated_at:
    type: string
    format: date-time

  version:
    type: string
    description: "语义化版本号"
