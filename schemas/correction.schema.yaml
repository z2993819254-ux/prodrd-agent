# corrections.yaml Schema

type: array
items:
  type: object
  required: [id, timestamp, target_slot, category, old_value, new_value, applied]
  properties:
    id:
      type: string
      description: "纠正记录 ID（corr_YYYYMMDD_NNN）"

    timestamp:
      type: string
      format: date-time

    target_slot:
      type: string
      description: "纠正对应的槽位 slot_key"

    category:
      type: string
      enum: [identity, worldview, expression, cognition, emotion, social]

    old_value:
      type: string
      description: "纠正前的槽位内��"

    new_value:
      type: string
      description: "纠正后的槽位内容"

    user_description:
      type: string
      description: "用户的纠正说明"

    trigger_message_id:
      type: string
      nullable: true
      description: "触发纠正的消息 ID"

    applied:
      type: boolean
      description: "是否已应用"
